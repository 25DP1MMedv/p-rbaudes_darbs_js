<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin & Win</title>

  <link rel="stylesheet" href="main.css">
</head>
<body>

<div class="container">

  <div class="topbar">

    <h1>SPIN & WIN</h1>

    <div class="balance-box">
      <span>Bilance</span>
      <h2 id="balance">100.00 €</h2>
    </div>

  </div>

  <div class="game">

    <div class="left-side">

      <div class="wheel-wrap">
        <div class="pointer">▼</div>

        <canvas id="wheel" width="500" height="500"></canvas>
      </div>

      <div class="joke-box" id="joke-box">
        Spied GRIEZT un riskē ar savu “bagātību”
      </div>

    </div>

    <div class="controls">

      <div class="bet-box">

        <label>Likme</label>

        <div class="bet-row">

          <button id="minus">−</button>

          <div id="bet">1.00 €</div>

          <button id="plus">+</button>

        </div>

        <div class="quick">

          <button class="quick-btn" data-add="1">
            +1€
          </button>

          <button class="quick-btn" data-add="10">
            +10€
          </button>

          <button class="quick-btn" data-add="100">
            +100€
          </button>

          <button class="quick-btn" data-add="1000">
            +1000€
          </button>

        </div>

        <div class="balance-set">

          <input
            type="number"
            id="custom-balance"
            placeholder="Ievadi bilanci">

          <button id="set-balance">
            SET
          </button>

        </div>

      </div>

      <button id="spin">
        GRIEZT
      </button>

      <div class="result" id="result">
        Nospied GRIEZT
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
